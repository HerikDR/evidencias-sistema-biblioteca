<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Realizar Empréstimo — Sistema Biblioteca</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4" style="max-width: 640px">
    <h1 class="mb-1">Realizar empréstimo</h1>
    <p class="text-muted mb-4">Informe a matrícula do aluno e os códigos de patrimônio dos exemplares.</p>

    <div th:if="${erro}" class="alert alert-danger" role="alert" th:text="${erro}"></div>

    <form th:action="@{/emprestimos}" th:object="${form}" method="post">

        <div class="mb-3">
            <label for="matricula" class="form-label">Matrícula do aluno <span class="text-danger">*</span></label>
            <input type="text" id="matricula" th:field="*{matricula}"
                   placeholder="12345678" maxlength="8"
                   class="form-control" required/>
            <div class="form-text">8 dígitos, sem espaços.</div>
            <div class="form-text mt-1">
                <button type="submit"
                        formaction="/alunos/buscar"
                        formmethod="get"
                        formnovalidate
                        class="btn btn-link p-0 align-baseline">Não sabe a matrícula? Buscar aluno</button>
            </div>
        </div>

        <div class="mb-3">
            <label for="codigosPatrimonio" class="form-label">
                Códigos de patrimônio dos exemplares <span class="text-danger">*</span>
            </label>
            <textarea id="codigosPatrimonio" th:field="*{codigosPatrimonio}"
                      class="form-control" rows="5"
                      placeholder="000001&#10;000002&#10;000003" required></textarea>
            <div class="form-text">Informe o patrimônio do exemplar físico a ser emprestado. Use um código por linha, com 6 dígitos. Vírgulas também são aceitas.</div>
            <div class="form-text mt-1">
                <button type="submit"
                        formaction="/livros/buscar"
                        formmethod="get"
                        formnovalidate
                        class="btn btn-link p-0 align-baseline">Não sabe o patrimônio? Buscar por título</button>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Realizar Empréstimo</button>
            <a th:href="@{/}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>

</div>
</body>
</html>
