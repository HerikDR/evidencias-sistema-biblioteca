<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Comprovante de Devolução — Sistema Biblioteca</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4" style="max-width: 760px">

    <div class="alert alert-success mb-4">
        Devolução registrada com sucesso.
    </div>

    <div class="card">
        <div class="card-header bg-warning text-dark">
            <h5 class="mb-0">Comprovante de Devolução</h5>
        </div>
        <div class="card-body">

            <div class="row mb-3">
                <div class="col-sm-6">
                    <strong>Aluno:</strong>
                    <span th:text="${resultado.alunoNome}"></span>
                </div>
                <div class="col-sm-6">
                    <strong>Matrícula:</strong>
                    <span th:text="${resultado.alunoMatricula}"></span>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-6">
                    <strong>Cód. Patrimônio:</strong>
                    <span th:text="${resultado.livroCodigoPatrimonio}"></span>
                </div>
                <div class="col-sm-6">
                    <strong>Título:</strong>
                    <span th:text="${resultado.tituloNome}"></span>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-6">
                    <strong>Data prevista de devolução:</strong>
                    <span th:text="${resultado.dataPrevistaDevolucao != null
                        ? #temporals.format(resultado.dataPrevistaDevolucao, 'dd/MM/yyyy')
                        : '—'}"></span>
                </div>
                <div class="col-sm-6">
                    <strong>Data de devolução:</strong>
                    <span th:text="${#temporals.format(resultado.dataDevolucao, 'dd/MM/yyyy')}"></span>
                </div>
            </div>

            <hr/>

            <div th:if="${resultado.diasAtraso > 0}" class="alert alert-danger mb-0">
                <strong>Atraso:</strong>
                <span th:text="${resultado.diasAtraso}"></span> dia(s) —
                <strong>Débito gerado:</strong>
                R$ <span th:text="${#numbers.formatDecimal(resultado.valorMulta, 1, 'COMMA', 2, 'POINT')}"></span>
                (R$ 1,00/dia)
            </div>

            <div th:if="${resultado.diasAtraso == 0}" class="alert alert-success mb-0">
                Devolução no prazo. Nenhum débito gerado.
            </div>

            <div th:if="${resultado.emprestimoEncerrado}" class="mt-2">
                <span class="badge bg-secondary">Empréstimo encerrado</span>
            </div>
        </div>
    </div>

    <div class="d-flex gap-2 mt-4">
        <a href="/emprestimos/devolver" class="btn btn-warning">Nova Devolução</a>
        <a href="/emprestimos/novo" class="btn btn-primary">Novo Empréstimo</a>
    </div>
</div>
</body>
</html>
