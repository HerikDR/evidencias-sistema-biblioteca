<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Comprovante de Empréstimo — Sistema Biblioteca</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4" style="max-width: 760px">

    <div class="alert alert-success mb-4">
        Empréstimo realizado com sucesso.
    </div>

    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                Comprovante de Empréstimo
                <span class="float-end">#<span th:text="${emprestimo.id}"></span></span>
            </h5>
        </div>
        <div class="card-body">
            <div class="row mb-3">
                <div class="col-sm-6">
                    <strong>Aluno:</strong>
                    <span th:text="${emprestimo.aluno.nome}"></span>
                </div>
                <div class="col-sm-6">
                    <strong>Matrícula:</strong>
                    <span th:text="${emprestimo.aluno.matricula}"></span>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-6">
                    <strong>Data do empréstimo:</strong>
                    <span th:text="${#temporals.format(emprestimo.dataEmprestimo, 'dd/MM/yyyy')}"></span>
                </div>
                <div class="col-sm-6">
                    <strong>Status:</strong>
                    <span class="badge bg-success" th:text="${emprestimo.status}"></span>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-sm-6">
                    <strong>Prazo final de devolução:</strong>
                    <span th:text="${prazoFinalDias}"></span> dias
                </div>
                <div class="col-sm-6">
                    <strong>Data prevista de devolução:</strong>
                    <span th:text="${#temporals.format(emprestimo.dataPrevistaDevolucao, 'dd/MM/yyyy')}"></span>
                </div>
            </div>

            <hr/>

            <h6 class="mt-3">
                Livros emprestados
                (<span th:text="${#lists.size(emprestimo.itens)}"></span>):
            </h6>

            <table class="table table-sm table-striped">
                <thead class="table-light">
                <tr>
                    <th>Cód. Patrimônio</th>
                    <th>Título</th>
                    <th>Prazo do título (dias)</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${emprestimo.itens}">
                    <td th:text="${item.livro.codigoPatrimonio}"></td>
                    <td th:text="${item.livro.titulo?.nome}"></td>
                    <td th:text="${item.livro.titulo?.prazo}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="d-flex gap-2 mt-4">
        <a href="/emprestimos/novo" class="btn btn-primary">Novo Empréstimo</a>
    </div>
</div>
</body>
</html>
