<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Devolver Livro — Sistema Biblioteca</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4" style="max-width: 560px">
    <h1 class="mb-1">Devolver livro</h1>
    <p class="text-muted mb-4">Informe o código de patrimônio do exemplar a ser devolvido.</p>

    <div th:if="${erro}" class="alert alert-danger" role="alert" th:text="${erro}"></div>

    <form action="/emprestimos/devolver" method="post">

        <div class="mb-3">
            <label for="codigoPatrimonio" class="form-label">
                Código de patrimônio <span class="text-danger">*</span>
            </label>
            <input type="text" id="codigoPatrimonio" name="codigoPatrimonio"
                   th:value="${codigoPatrimonio}"
                   placeholder="000001" maxlength="6"
                   class="form-control" required/>
            <div class="form-text">6 dígitos numéricos do exemplar físico.</div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning">Devolver</button>
            <a th:href="@{/}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>

</div>
</body>
</html>
