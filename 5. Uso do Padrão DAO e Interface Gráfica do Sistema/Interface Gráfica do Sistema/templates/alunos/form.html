<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Cadastrar Aluno — Sistema Biblioteca</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4" style="max-width: 640px">
    <h1 class="mb-3">Cadastrar aluno</h1>

    <form th:action="@{/alunos}" th:object="${aluno}" method="post">
        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" role="alert">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" class="mb-0"></p>
        </div>

        <div class="mb-3">
            <label for="matricula" class="form-label">Matrícula <span class="text-danger">*</span></label>
            <input type="text" id="matricula" th:field="*{matricula}"
                   placeholder="12345678" maxlength="8"
                   class="form-control" th:classappend="${#fields.hasErrors('matricula')} ? 'is-invalid'"/>
            <div class="form-text">Informe 8 dígitos, sem espaços.</div>
            <div class="invalid-feedback" th:errors="*{matricula}"></div>
        </div>

        <div class="mb-3">
            <label for="nome" class="form-label">Nome <span class="text-danger">*</span></label>
            <input type="text" id="nome" th:field="*{nome}"
                   class="form-control" th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{nome}"></div>
        </div>

        <div class="mb-3">
            <label for="cpf" class="form-label">CPF</label>
            <input type="text" id="cpf" th:field="*{cpf}"
                   placeholder="12345678901"
                   class="form-control" maxlength="11"
                   th:classappend="${#fields.hasErrors('cpf')} ? 'is-invalid'"/>
            <div class="form-text">Informe 11 dígitos, sem pontos ou traço.</div>
            <div class="invalid-feedback" th:errors="*{cpf}"></div>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" id="email" th:field="*{email}"
                   placeholder="aluno@uel.br"
                   class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{email}"></div>
        </div>

        <div class="mb-3">
            <label for="endereco" class="form-label">Endereço</label>
            <input type="text" id="endereco" th:field="*{endereco}"
                   placeholder="Rua das Flores, 123 — Londrina/PR"
                   class="form-control"/>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Salvar</button>
            <a href="/alunos" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
