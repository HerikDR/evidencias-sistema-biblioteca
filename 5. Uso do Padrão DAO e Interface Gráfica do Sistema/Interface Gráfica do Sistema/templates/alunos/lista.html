<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Alunos — Sistema Biblioteca</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4">
    <h1 class="mb-3">Alunos cadastrados</h1>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

    <a href="/alunos/novo" class="btn btn-primary mb-3">Novo aluno</a>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Matrícula</th>
            <th>Nome</th>
            <th>CPF</th>
            <th>E-mail</th>
            <th>Ativo</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="aluno : ${alunos}">
            <td th:text="${aluno.matricula}"></td>
            <td th:text="${aluno.nome}"></td>
            <td th:text="${aluno.cpf}"></td>
            <td th:text="${aluno.email}"></td>
            <td th:text="${aluno.ativo ? 'Sim' : 'Não'}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(alunos)}">
            <td colspan="5" class="text-center text-muted">Nenhum aluno cadastrado.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
