<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Buscar aluno — Sistema Biblioteca</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4" style="max-width: 800px">
    <h1 class="mb-1">Buscar aluno</h1>
    <p class="text-muted mb-4">Pesquise pelo nome ou CPF para localizar a matrícula do aluno.</p>

    <form method="get" th:action="@{/alunos/buscar}" class="row g-2 mb-4">
        <input type="hidden" name="matricula" th:value="${matricula}"/>
        <input type="hidden" name="codigosPatrimonio" th:value="${codigosPatrimonio}"/>
        <div class="col">
            <input type="text" name="q" th:value="${q}"
                   class="form-control"
                   placeholder="Ex.: Maria, João, 123.456.789-00"
                   autofocus/>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Buscar</button>
        </div>
    </form>

    <div th:if="${!#strings.isEmpty(q)}">
        <div th:if="${#lists.isEmpty(resultados)}" class="alert alert-warning">
            Nenhum aluno encontrado para "<span th:text="${q}"></span>".
        </div>

        <table th:if="${!#lists.isEmpty(resultados)}" class="table table-striped">
            <thead>
            <tr>
                <th>Matrícula</th>
                <th>Nome</th>
                <th>CPF</th>
                <th>Situação</th>
                <th>Ação</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="aluno : ${resultados}">
                <td th:text="${aluno.matricula}"></td>
                <td th:text="${aluno.nome}"></td>
                <td th:text="${aluno.cpf}"></td>
                <td th:text="${aluno.ativo ? 'Ativo' : 'Inativo'}"></td>
                <td>
                    <form th:if="${aluno.ativo}"
                          method="get"
                          th:action="@{/emprestimos/novo}">
                        <input type="hidden" name="matricula" th:value="${aluno.matricula}"/>
                        <input type="hidden" name="codigosPatrimonio" th:value="${codigosPatrimonio}"/>
                        <button type="submit" class="btn btn-sm btn-success">Usar este aluno</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/emprestimos/novo(matricula=${matricula},codigosPatrimonio=${codigosPatrimonio})}"
       class="btn btn-secondary mt-2">Voltar ao formulário de empréstimo</a>
</div>
</body>
</html>
