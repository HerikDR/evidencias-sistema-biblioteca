<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Cadastrar Livro — Sistema Biblioteca</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4" style="max-width: 640px">
    <h1 class="mb-3">Cadastrar livro</h1>

    <form th:action="@{/livros}" th:object="${livro}" method="post">
        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" role="alert">
            <p th:each="err : ${#fields.globalErrors()}" th:text="${err}" class="mb-0"></p>
        </div>

        <h5 class="mt-3 mb-2">Dados do exemplar</h5>

        <div class="mb-3">
            <label for="codigoPatrimonio" class="form-label">Código de Patrimônio <span class="text-danger">*</span></label>
            <input type="text" id="codigoPatrimonio" th:field="*{codigoPatrimonio}"
                   placeholder="000001" maxlength="6"
                   class="form-control" th:classappend="${#fields.hasErrors('codigoPatrimonio')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{codigoPatrimonio}"></div>
        </div>

        <div class="mb-3 form-check">
            <input type="checkbox" id="exemplarBiblioteca" th:field="*{exemplarBiblioteca}"
                   class="form-check-input"/>
            <label for="exemplarBiblioteca" class="form-check-label">
                Exemplar de biblioteca (não pode ser emprestado)
            </label>
        </div>

        <h5 class="mt-3 mb-2">Dados bibliográficos</h5>

        <div class="mb-3">
            <label for="tituloNome" class="form-label">Título da obra <span class="text-danger">*</span></label>
            <input type="text" id="tituloNome" th:field="*{titulo.nome}"
                   class="form-control" th:classappend="${#fields.hasErrors('titulo.nome')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{titulo.nome}"></div>
        </div>

        <div class="mb-3">
            <label for="tituloAutor" class="form-label">Autor</label>
            <input type="text" id="tituloAutor" th:field="*{titulo.autor}"
                   class="form-control"/>
        </div>

        <div class="mb-3">
            <label for="tituloIsbn" class="form-label">ISBN <span class="text-danger">*</span></label>
            <input type="text" id="tituloIsbn" th:field="*{titulo.isbn}"
                   placeholder="1234567890123" maxlength="13"
                   class="form-control" th:classappend="${#fields.hasErrors('titulo.isbn')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{titulo.isbn}"></div>
            <div class="form-text">Informe 13 dígitos.</div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="tituloEditora" class="form-label">Editora</label>
                <input type="text" id="tituloEditora" th:field="*{titulo.editora}"
                       class="form-control"/>
            </div>
            <div class="col-md-3 mb-3">
                <label for="tituloEdicao" class="form-label">Edição</label>
                <input type="text" id="tituloEdicao" th:field="*{titulo.edicao}"
                       class="form-control"/>
            </div>
            <div class="col-md-3 mb-3">
                <label for="tituloAno" class="form-label">Ano</label>
                <input type="text" id="tituloAno" th:field="*{titulo.ano}"
                       maxlength="4"
                       class="form-control" th:classappend="${#fields.hasErrors('titulo.ano')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:errors="*{titulo.ano}"></div>
                <div class="form-text">Informe 4 dígitos.</div>
            </div>
        </div>

        <div class="mb-3">
            <label for="tituloPrazo" class="form-label">Prazo de devolução (dias)</label>
            <input type="number" id="tituloPrazo" th:field="*{titulo.prazo}"
                   min="1"
                   class="form-control" th:classappend="${#fields.hasErrors('titulo.prazo')} ? 'is-invalid'"/>
            <div class="invalid-feedback" th:errors="*{titulo.prazo}"></div>
            <div class="form-text">Dias corridos para devolução. Se não informado, será usado o padrão de 7 dias.</div>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-success">Salvar</button>
            <a href="/livros" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
</body>
</html>
