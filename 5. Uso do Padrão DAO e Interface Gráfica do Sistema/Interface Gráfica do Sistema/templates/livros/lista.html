<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Livros — Sistema Biblioteca</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4">
    <h1 class="mb-3">Livros cadastrados</h1>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

    <a href="/livros/novo" class="btn btn-primary mb-3">Novo livro</a>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Código de Patrimônio</th>
            <th>Título</th>
            <th>Autor</th>
            <th>Prazo de Devolução (dias)</th>
            <th>Disponível</th>
            <th>Exemplar Biblioteca</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="livro : ${livros}">
            <td th:text="${livro.codigoPatrimonio}"></td>
            <td th:text="${livro.titulo?.nome}"></td>
            <td th:text="${livro.titulo?.autor}"></td>
            <td th:text="${livro.titulo?.prazo}"></td>
            <td th:text="${livro.disponivel ? 'Sim' : 'Não'}"></td>
            <td th:text="${livro.exemplarBiblioteca ? 'Sim' : 'Não'}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(livros)}">
            <td colspan="6" class="text-center text-muted">Nenhum livro cadastrado.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
