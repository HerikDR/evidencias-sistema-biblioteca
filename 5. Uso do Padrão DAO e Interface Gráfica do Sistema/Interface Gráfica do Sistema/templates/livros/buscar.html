<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8"/>
    <title>Buscar exemplar — Sistema Biblioteca</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav th:replace="~{fragments/nav :: navbar}"></nav>
<div class="container mt-4" style="max-width: 800px">
    <h1 class="mb-1">Buscar exemplar</h1>
    <p class="text-muted mb-4">Pesquise por título, autor ou ISBN para localizar o código de patrimônio.</p>

    <form method="get" th:action="@{/livros/buscar}" class="row g-2 mb-4">
        <input type="hidden" name="matricula" th:value="${matricula}"/>
        <input type="hidden" name="codigosPatrimonio" th:value="${codigosPatrimonio}"/>
        <div class="col">
            <input type="text" name="q" th:value="${q}"
                   class="form-control"
                   placeholder="Ex.: Clean Code, Robert Martin, 9788576082705"
                   autofocus/>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Buscar</button>
        </div>
    </form>

    <div th:if="${!#strings.isEmpty(q)}">
        <div th:if="${#lists.isEmpty(resultados)}" class="alert alert-warning">
            Nenhum exemplar encontrado para "<span th:text="${q}"></span>".
        </div>

        <table th:if="${!#lists.isEmpty(resultados)}" class="table table-striped">
            <thead>
            <tr>
                <th>Título</th>
                <th>Autor</th>
                <th>ISBN</th>
                <th>Patrimônio</th>
                <th>Disponível</th>
                <th>Exemplar Biblioteca</th>
                <th>Ação</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="livro : ${resultados}">
                <td th:text="${livro.titulo?.nome}"></td>
                <td th:text="${livro.titulo?.autor}"></td>
                <td th:text="${livro.titulo?.isbn}"></td>
                <td th:text="${livro.codigoPatrimonio}"></td>
                <td th:text="${livro.disponivel ? 'Sim' : 'Não'}"></td>
                <td th:text="${livro.exemplarBiblioteca ? 'Sim' : 'Não'}"></td>
                <td>
                    <form th:if="${livro.disponivel && !livro.exemplarBiblioteca}"
                          th:with="combinado=${#strings.isEmpty(codigosPatrimonio) ? livro.codigoPatrimonio : (#strings.contains(codigosPatrimonio, livro.codigoPatrimonio) ? codigosPatrimonio : codigosPatrimonio + ',' + livro.codigoPatrimonio)}"
                          method="get"
                          th:action="@{/emprestimos/novo}">
                        <input type="hidden" name="matricula" th:value="${matricula}"/>
                        <input type="hidden" name="codigosPatrimonio" th:value="${combinado}"/>
                        <button type="submit" class="btn btn-sm btn-success">Usar este exemplar</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <a th:href="@{/emprestimos/novo(matricula=${matricula},codigosPatrimonio=${codigosPatrimonio})}"
       class="btn btn-secondary mt-2">Voltar ao formulário de empréstimo</a>
</div>
</body>
</html>
